# Set this to your app name at scaffold time (e.g. "macro-metrics")
fullnameOverride: "holiday-planning"
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: balenthiran.co.uk
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    - hosts:
        - balenthiran.co.uk
      secretName: balenthiran-tls # shared wildcard cert — no per-project TLS setup
registryPrefix: "lhr.ocir.io/lr7uc6l49odc" # shared OCIR namespace
apps:
  - name: backend
    image:
      repository: lhr.ocir.io/lr7uc6l49odc/holiday-planning-backend # Update at scaffold time
      tag: 0.1.25
      pullPolicy: Always
    containerPort: 8080
    replicas: 1
    service:
      port: 80
      targetPort: 8080
    ingress:
      path: /holiday-planning/api # developer replaces 'holiday-planning' at scaffold time
      pathType: Prefix
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
  - name: frontend
    image:
      repository: lhr.ocir.io/lr7uc6l49odc/holiday-planning-frontend # Update at scaffold time
      tag: 0.1.25
      pullPolicy: Always
    containerPort: 80
    replicas: 1
    service:
      port: 80
      targetPort: 80
    ingress:
      path: /holiday-planning # developer replaces 'holiday-planning' at scaffold time
      pathType: Prefix
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
# App-specific secrets — add per project (none pre-scaffolded):
